# docker-compose.override.yml — HTTPS deployment layer (remote-MinIO + Let's Encrypt).
#
# Auto-merged with docker-compose.yml by `docker compose`. Configures an HTTPS deployment:
#   - One Caddy instance (custom image with the layer4 plugin — compose/caddy/Dockerfile)
#     terminates VALID Let's Encrypt TLS on :443 (webapp / + dserver API /lookup) and on
#     :9000 (layer4: TLS-terminate, then RAW-TCP proxy to the remote MinIO).
#   - dserver runs under gunicorn mounted at /lookup (SCRIPT_NAME).
#   - The S3 backend is a REMOTE MinIO at 10.0.0.2:9000 (plain HTTP) reached over the
#     WireGuard tunnel wg0; there is NO local minio container (disabled in the base file).
#   - Caddy obtains/renews the cert via ACME HTTP-01 and shares it with the :9000 layer4
#     handler (caddy.json -> apps.tls.certificates.automate). No private CA, no ./certs.
#
# The public hostname comes from $DEPLOY_FQDN (set in .env — see .env.template) for the
# compose-level wiring here; caddy.json names the host directly (Caddy JSON has no {$VAR}
# substitution). Keep DEPLOY_FQDN in .env equal to the host named in caddy.json.
#
# Why a LAYER4 (not HTTP) proxy fronts :9000: an HTTP reverse proxy (Caddy/Go net/http)
# canonicalises response header names (x-amz-meta-* -> X-Amz-Meta-*), and botocore parses
# S3 object metadata case-sensitively after the prefix, so proxied reads come back with
# 'Type'/'Handle' keys and dtool-s3 KeyErrors on dserver's server-side reads (used to mint
# presigned URLs). A layer4 proxy never parses HTTP, so the lowercase headers survive.
# See CLAUDE.md "HTTPS deployment recipe" and compose/caddy/Dockerfile.

services:
  # ==========================================================================
  # dserver-build-venv - install the SAML token-generator plugin for this branch
  # ==========================================================================
  # Base make-venv.sh installs the SAML plugin only when INSTALL_SAML_PLUGIN=true; this
  # branch wires SAML (THERS 機構IdP) alongside the existing ORCID OAuth2 login.
  dserver-build-venv:
    environment:
      INSTALL_SAML_PLUGIN: "true"

  # ==========================================================================
  # Caddy - LE TLS termination + reverse proxy (:443 web UI/API) and layer4 (:9000 -> remote MinIO)
  # ==========================================================================
  caddy:
    build:
      context: .
      dockerfile: ./compose/caddy/Dockerfile
    image: dserver_caddy_l4
    depends_on:
      dserver:
        condition: service_healthy
      webapp:
        condition: service_started
    command: ["caddy", "run", "--config", "/etc/caddy/caddy.json"]
    ports:
      - "80:80"       # ACME HTTP-01 challenge + HTTP -> HTTPS redirect
      - "443:443"     # webapp (/) + dserver API (/lookup)
      - "9000:9000"   # layer4: TLS-terminate, raw-TCP proxy to the remote MinIO
    volumes:
      - ./caddy.json:/etc/caddy/caddy.json:ro
      - caddy_data:/data    # persist the issued LE cert + ACME account (avoid re-issue/rate-limits)
    networks:
      dserver_net:
        aliases:
          # Resolve the public FQDN to Caddy *inside* the network, so dserver/index-s3 reach
          # S3 at the same host:port the browser uses — the presigned URL's SigV4 Host
          # (DEPLOY_FQDN:9000) then matches, and the public LE cert verifies normally.
          - ${DEPLOY_FQDN:?DEPLOY_FQDN must be set (see .env.template)}
    restart: unless-stopped

  # ==========================================================================
  # dserver - serve under gunicorn at /lookup; read+sign S3 against the public TLS endpoint
  # ==========================================================================
  dserver:
    command: ["bash", "/app/compose/dserver/scripts/start-dserver-gunicorn.sh"]
    environment:
      # Mount the whole app under /lookup (gunicorn honours SCRIPT_NAME; Caddy routes /lookup*).
      SCRIPT_NAME: /lookup
      # Read AND presign against the public S3 endpoint. Resolves to Caddy's :9000 layer4
      # terminator via the network alias, which raw-TCP-forwards to the remote MinIO — so
      # reads keep lowercase metadata headers and the presigned URL's SigV4 Host
      # (DEPLOY_FQDN:9000) matches what the browser sends. The cert is publicly trusted, so
      # no AWS_CA_BUNDLE is needed. (S3_ENDPOINT here overrides the base http://minio:9000;
      # export-s3-env.sh turns it into DTOOL_S3_ENDPOINT_<bucket> at runtime.)
      S3_ENDPOINT: https://${DEPLOY_FQDN}:9000
      # Pass the FQDN through so the gunicorn start script registers/logs the right base URI.
      DEPLOY_FQDN: ${DEPLOY_FQDN}
      # Public URLs behind the proxy (all under /lookup for the API).
      OAUTH2_BASE_URL: https://${DEPLOY_FQDN}/lookup
      # The plugin uses OAUTH2_REDIRECT_URI verbatim if set, and the base docker-compose.yml
      # pins it to the 127.0.0.1:5000 dev value — so it MUST be overridden here (plugin is at
      # /auth/oauth2). Register this exact URI at ORCID.
      OAUTH2_REDIRECT_URI: https://${DEPLOY_FQDN}/lookup/auth/oauth2/callback
      OAUTH2_FRONTEND_URL: https://${DEPLOY_FQDN}
      OAUTH2_LOGIN_SUCCESS_REDIRECT: https://${DEPLOY_FQDN}
      OAUTH2_LOGIN_ERROR_REDIRECT: https://${DEPLOY_FQDN}/login?error=auth_failed
      # Make Swagger "Try it out" target the prefixed public URL.
      API_SPEC_OPTIONS: '{"servers":[{"url":"https://${DEPLOY_FQDN}/lookup","description":"dserver"}]}'
      # --- SAML SP (THERS 機構統合認証 / 機構IdP), prefix /auth/saml, in parallel with the
      # other auth plugins (/auth/oauth2, /auth/ldap) ---
      # Public SP endpoints (same-origin behind Caddy /lookup*): metadata/ACS/SLS derive from
      # SAML_BASE_URL + /auth/saml. Register SAML_SP_ENTITY_ID + the /auth/saml/metadata doc
      # with THERS.
      SAML_BASE_URL: https://${DEPLOY_FQDN}/lookup
      SAML_URL_PREFIX: /auth/saml
      SAML_SP_ENTITY_ID: https://${DEPLOY_FQDN}/lookup/auth/saml/metadata
      # SP signing/encryption keypair — auto-generated (self-signed) by start-dserver-gunicorn.sh
      # if missing; its public cert is embedded in the SP metadata THERS imports.
      SAML_SP_KEY_FILE: /app/compose/dserver/saml/sp-key.pem
      SAML_SP_CERT_FILE: /app/compose/dserver/saml/sp-cert.pem
      # THERS IdP metadata — supplied after they grant test access. Leave empty until then:
      # /auth/saml/metadata still works (to send THERS our SP metadata); /auth/saml/login
      # activates once the IdP metadata + entityID are set in .env.
      #
      # PREFER the remote URL over a static file: THERS will rotate the IdP's SAML cert to a
      # self-signed one (~2027-03). pysaml2 trusts the signing key embedded in the IdP
      # metadata (explicit-key / metadata trust — no PKIX/CA pinning), so a self-signed cert
      # is fine AS LONG AS we consume fresh metadata. A static SAML_IDP_METADATA_FILE snapshot
      # would go stale at rotation and break signature validation; the remote URL stays current.
      #   Production IdP: SAML_IDP_METADATA_URL=https://shib.sys.thers.ac.jp/idp/shibboleth
      #                   SAML_IDP_ENTITY_ID=https://shib.sys.thers.ac.jp/idp/shibboleth
      #   Test IdP:       (different URL/entityID, provided by THERS on approval)
      SAML_IDP_METADATA_URL: ${SAML_IDP_METADATA_URL:-}
      SAML_IDP_METADATA_FILE: ${SAML_IDP_METADATA_FILE:-}
      SAML_IDP_ENTITY_ID: ${SAML_IDP_ENTITY_ID:-}
      # THERS attribute release → dserver username. Per the THERS manual §4.2, the dserver
      # username is `uid` = the 機構アカウント (xx.xxx.xxxx@x.thers.ac.jp), which equals
      # `thersUPN` ("uid と同値"). uid is chosen over eduPersonPrincipalName because the manual
      # marks ePPN "学認用の属性であり、通常は使用しません" (GakuNin-only, normally unused).
      # uid/mail/displayName are all natively mapped by pysaml2 (standard LDAP OIDs), so no
      # raw-OID mapping is needed. Override in .env if THERS releases something different.
      SAML_ATTRIBUTE_MAP: ${SAML_ATTRIBUTE_MAP:-uid:user_id,mail:email,displayName:display_name}
      SAML_USERNAME_FIELD: ${SAML_USERNAME_FIELD:-user_id}
      SAML_LOGIN_SUCCESS_REDIRECT: https://${DEPLOY_FQDN}
      SAML_LOGIN_ERROR_REDIRECT: https://${DEPLOY_FQDN}/login?error=auth_failed
      # The SAML plugin mints the same RS256 dserver JWT — point it at dserver's private key.
      JWT_PRIVATE_KEY_FILE: /app/compose/dserver/jwt/jwt_key
    healthcheck:
      # The API now lives under /lookup, so the health probe must include the prefix.
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/lookup/config/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # index-s3 (profile: index) - read S3 over the public TLS endpoint too
  # ==========================================================================
  index-s3:
    environment:
      S3_ENDPOINT: https://${DEPLOY_FQDN}:9000

  # ==========================================================================
  # webapp - point at the public HTTPS API; keep the dev server (hot-reload)
  # ==========================================================================
  webapp:
    environment:
      VUE_APP_DTOOL_LOOKUP_SERVER_URL: https://${DEPLOY_FQDN}/lookup
      VUE_APP_DTOOL_LOOKUP_SERVER_TOKEN_GENERATOR_URL: https://${DEPLOY_FQDN}/lookup/auth/token
      # ORCID OAuth2 login/logout URLs (plugin prefix /auth/oauth2). These MUST be overridden:
      # the base docker-compose.yml pins them to the 127.0.0.1:5000 dev values, which would
      # otherwise show on the public webapp's "Log in with ORCID" button.
      VUE_APP_OAUTH2_LOGIN_URL: https://${DEPLOY_FQDN}/lookup/auth/oauth2/login
      VUE_APP_DTOOL_LOOKUP_SERVER_AUTH_LOGOUT_URL: https://${DEPLOY_FQDN}/lookup/auth/oauth2/logout
      # Real ORCID OAuth2 login is active (creds in .env). The username/password form is
      # hidden because the OAuth2 plugin doesn't accept it — only the "Log in with ORCID"
      # button works. (Set "true" only if you swap in the dummy token generator.)
      VUE_APP_SHOW_USERNAME_PASSWORD_FORM: "false"
      # Login-page text — override the base compose's dev "Demo credentials" block.
      # MESSAGE renders as HTML, so the homepage link is an inline <a>.
      VUE_APP_THIRD_CONTAINER_HEADING: "ZHANG Lab Data Repository"
      VUE_APP_THIRD_CONTAINER_MESSAGE: 'This is the Data Repository of the ZHANG Lab, Department of Complex Systems Science, Graduate School of Informatics, Nagoya University. See the <a href="https://zhang-laboratory.org">group homepage</a>.'
      # "Supporting Documentation" links (fourth container). SignIn.vue uses its hard-coded
      # defaults only when this is unset, so the whole list is given here; the FIRST entry is
      # the dtool project homepage (replacing the default webapp-repo link, as on demo.dtool.dev).
      VUE_APP_FOURTH_CONTAINER_RESOURCES: '[{"text":"dtool project homepage","url":"https://dtool.dev"},{"text":"dserver REST API documentation","url":"https://${DEPLOY_FQDN}/lookup/doc/swagger"},{"text":"dtool documentation","url":"https://dtool.readthedocs.io/"}]'
      # Cap Node heap on this ~2 GB box to reduce OOM risk during compile.
      NODE_OPTIONS: "--max-old-space-size=512"
    volumes:
      # Accept the proxied Host header (allowedHosts) without editing the submodule.
      - ./compose/webapp/vue.config.js:/app/vue.config.js:ro

volumes:
  caddy_data: {}   # persist the issued LE cert + ACME account across restarts

# docker-compose.override.yml — HTTPS deployment layer.
#
# Auto-merged with docker-compose.yml by `docker compose`. Configures an HTTPS deployment:
#   - Caddy terminates TLS on :443 for the webapp (/) and dserver API (/lookup).
#   - dserver runs under gunicorn mounted at /lookup (SCRIPT_NAME).
#   - MinIO terminates its OWN TLS on :9000 (NOT proxied by Caddy — see note below) so
#     browser-usable S3 presigned URLs work and dserver's server-side S3 reads succeed.
#   - One local CA (./certs, from ./gen-tls-certs.sh) signs the single server cert used by
#     BOTH Caddy and MinIO; clients trust ./certs/ca.crt.
#
# The public hostname comes from $DEPLOY_FQDN (set in .env — see .env.template).
# Every `${DEPLOY_FQDN:?...}` reference fails compose loudly if it's unset.
#
# Why MinIO does its own TLS instead of going through Caddy: Caddy (Go net/http)
# canonicalises response header names (x-amz-meta-* -> X-Amz-Meta-*), and botocore parses
# S3 object metadata case-sensitively after the prefix, so proxied reads come back with
# 'Type'/'Handle' keys and dtool-s3 KeyErrors. Native MinIO TLS preserves the lowercase
# headers. See CLAUDE.md "HTTPS deployment recipe".
#
# Run ./gen-tls-certs.sh before the first `docker compose up`.

services:
  # ==========================================================================
  # Caddy - TLS termination + reverse proxy for the web UI (webapp + dserver API)
  # ==========================================================================
  caddy:
    image: caddy:2-alpine
    depends_on:
      dserver:
        condition: service_healthy
      webapp:
        condition: service_started
    ports:
      - "80:80"     # HTTP -> HTTPS redirect
      - "443:443"   # webapp (/) + dserver API (/lookup)
    environment:
      # Caddyfile uses {$DEPLOY_FQDN} for the site address; pass it through.
      DEPLOY_FQDN: ${DEPLOY_FQDN:?DEPLOY_FQDN must be set (see .env.template)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro   # shared server cert/key (same CA as MinIO)
    networks:
      - dserver_net   # MUST be on the app network to resolve dserver/webapp via Docker DNS
    restart: unless-stopped

  # ==========================================================================
  # MinIO - native TLS on :9000 (shared cert); the presigned-URL host
  # ==========================================================================
  minio:
    # Serve TLS from the shared cert. --certs-dir expects public.crt + private.key.
    command: server /data --certs-dir /certs --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API over TLS, published on the firewall-open port
    volumes:
      - ./certs/server.crt:/certs/public.crt:ro
      - ./certs/server.key:/certs/private.key:ro
    networks:
      dserver_net:
        aliases:
          # Resolve the public FQDN to MinIO *inside* the network, so dserver/index-s3
          # reach S3 at the same host:port the browser uses (consistent SigV4 host) and
          # the leaf cert (SAN includes the FQDN) verifies.
          - ${DEPLOY_FQDN:?DEPLOY_FQDN must be set (see .env.template)}

  # ==========================================================================
  # MinIO bucket init - talk to MinIO over TLS now (skip verify for this internal one-shot)
  # ==========================================================================
  minio-init:
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc --insecure alias set minio https://minio:9000 minioadmin minioadmin;
      /usr/bin/mc --insecure mb --ignore-existing minio/dtool-bucket;
      /usr/bin/mc --insecure anonymous set public minio/dtool-bucket;
      exit 0;
      "

  # ==========================================================================
  # dserver - serve under gunicorn at /lookup; read+sign S3 against the public TLS endpoint
  # ==========================================================================
  dserver:
    command: ["bash", "/app/compose/dserver/scripts/start-dserver-gunicorn.sh"]
    environment:
      # Mount the whole app under /lookup (gunicorn honours SCRIPT_NAME; Caddy routes /lookup*).
      SCRIPT_NAME: /lookup
      # Read AND presign against the public S3 endpoint. Resolves to MinIO directly via the
      # network alias (no proxy), so reads get lowercase metadata headers and the presigned
      # URL's SigV4 Host (DEPLOY_FQDN:9000) matches what the browser sends.
      DTOOL_S3_ENDPOINT_dtool-bucket: https://${DEPLOY_FQDN}:9000
      # Trust the shared local CA for boto's S3 TLS only (scoped to boto via AWS_CA_BUNDLE).
      # Do NOT set REQUESTS_CA_BUNDLE/SSL_CERT_FILE globally, or public HTTPS (e.g. the
      # ORCID OAuth2 token exchange) would fail to verify against this private root.
      AWS_CA_BUNDLE: /certs/ca.crt
      # Pass the FQDN through so the gunicorn start script can log the public URL.
      DEPLOY_FQDN: ${DEPLOY_FQDN}
      # Public URLs behind the proxy (all under /lookup for the API).
      OAUTH2_BASE_URL: https://${DEPLOY_FQDN}/lookup
      OAUTH2_FRONTEND_URL: https://${DEPLOY_FQDN}
      OAUTH2_LOGIN_SUCCESS_REDIRECT: https://${DEPLOY_FQDN}
      OAUTH2_LOGIN_ERROR_REDIRECT: https://${DEPLOY_FQDN}/login?error=auth_failed
      # Make Swagger "Try it out" target the prefixed public URL.
      API_SPEC_OPTIONS: '{"servers":[{"url":"https://${DEPLOY_FQDN}/lookup","description":"dserver"}]}'
    volumes:
      - ./certs:/certs:ro   # shared CA root (ca.crt) for AWS_CA_BUNDLE
    healthcheck:
      # The API now lives under /lookup, so the health probe must include the prefix.
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/lookup/config/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # index-s3 (profile: index) - read S3 over the public TLS endpoint too
  # ==========================================================================
  index-s3:
    environment:
      DTOOL_S3_ENDPOINT_dtool-bucket: https://${DEPLOY_FQDN}:9000
      AWS_CA_BUNDLE: /certs/ca.crt
    volumes:
      - ./certs:/certs:ro

  # ==========================================================================
  # webapp - point at the public HTTPS API; keep the dev server (hot-reload)
  # ==========================================================================
  webapp:
    environment:
      VUE_APP_DTOOL_LOOKUP_SERVER_URL: https://${DEPLOY_FQDN}/lookup
      VUE_APP_DTOOL_LOOKUP_SERVER_TOKEN_GENERATOR_URL: https://${DEPLOY_FQDN}/lookup/auth/token
      # Real ORCID OAuth2 login is active (creds in .env). The username/password form is
      # hidden because the OAuth2 plugin doesn't accept it — only the "Log in with ORCID"
      # button works. (Set "true" only if you swap in the dummy token generator.)
      VUE_APP_SHOW_USERNAME_PASSWORD_FORM: "false"
      # Cap Node heap on this ~2 GB box to reduce OOM risk during compile.
      NODE_OPTIONS: "--max-old-space-size=512"
    volumes:
      # Accept the proxied Host header (allowedHosts) without editing the submodule.
      - ./compose/webapp/vue.config.js:/app/vue.config.js:ro
